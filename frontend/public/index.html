<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10b981" />
  <meta name="description" content="HRMS Luminoid - Complete HR Management System with real-time GPS tracking for field employees" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HRMS Luminoid" />
  <link rel="apple-touch-icon" href="/icon-192x192.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icon-192x192.png" />
  <title>HRMS Luminoid - Employee Management & Tracking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <script>
    // Register service worker for background tracking & offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => {
          console.log('[SW] ✅ Service Worker registered', reg);
          // Request notification permission for alerts
          if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission()
              .then(perm => console.log('[SW] Notification permission:', perm));
          }
        })
        .catch(err => {
          console.error('[SW] ❌ Service Worker registration failed:', err);
        });
    } else {
      console.warn('[SW] ⚠️ Service Worker not supported in this browser');
    }

    // PWA Install Prompt Debug
    // Note: The actual beforeinstallprompt handling is done in PWAInstallBanner component
    // This logs it here for debugging purposes
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('[PWA] beforeinstallprompt event FIRED in index.html');
      // Let the component handle this event
    });
  </script>
</body>

</html>
