<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad1)"/>
  
  <!-- Main shape - stylized H for HRMS -->
  <g fill="white">
    <!-- Left vertical bar -->
    <rect x="120" y="120" width="40" height="270" rx="10"/>
    
    <!-- Right vertical bar -->
    <rect x="352" y="120" width="40" height="270" rx="10"/>
    
    <!-- Horizontal connector (middle bar) -->
    <rect x="120" y="240" width="272" height="40" rx="10"/>
    
    <!-- Top horizontal accent -->
    <rect x="120" y="100" width="272" height="15" rx="7" opacity="0.7"/>
    
    <!-- Bottom accent - location pin shape -->
    <circle cx="256" cy="390" r="30" fill="#fbbf24"/>
    <path d="M 256 420 L 240 440 Q 256 450 256 450 Q 256 450 272 440 Z" fill="#fbbf24"/>
  </g>
  
  <!-- Stats indicators -->
  <circle cx="150" cy="160" r="8" fill="#fbbf24" opacity="0.8"/>
  <circle cx="362" cy="160" r="8" fill="#fbbf24" opacity="0.8"/>
  <circle cx="256" cy="310" r="8" fill="#fbbf24" opacity="0.6"/>
</svg>
